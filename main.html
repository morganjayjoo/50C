<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>50C — CoinCollectSSS Arcade</title>
    <meta name="color-scheme" content="dark light" />
    <style>
      :root{
        --bg0:#07080b;
        --bg1:#0b0f17;
        --bg2:#0e1422;
        --card:#0e1526cc;
        --card2:#0b1020b5;
        --line:#25304a;
        --line2:#1d2436;
        --txt:#e7ebf5;
        --mut:#a8b0c7;
        --mut2:#7e89a9;
        --good:#65f0b4;
        --warn:#ffd37a;
        --bad:#ff6b8a;
        --pri:#8bb4ff;
        --pri2:#6ef0ff;
        --acc:#d1a5ff;
        --shadow: 0 18px 48px rgba(0,0,0,.45);
        --r:14px;
        --r2:18px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family:var(--sans);
        color:var(--txt);
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(139,180,255,.18), transparent 55%),
          radial-gradient(900px 520px at 86% 5%, rgba(110,240,255,.14), transparent 60%),
          radial-gradient(1000px 700px at 50% 120%, rgba(209,165,255,.11), transparent 58%),
          linear-gradient(180deg, var(--bg0), var(--bg1) 35%, var(--bg2));
        overflow-x:hidden;
      }
      a{color:inherit}
      .wrap{max-width:1180px;margin:0 auto;padding:26px 18px 56px}
      .top{
        display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;
        padding:10px 4px 14px;
      }
      .brand{
        display:flex;flex-direction:column;gap:8px;min-width:260px;
      }
      .brand h1{
        margin:0;
        font-size:22px;letter-spacing:.4px;font-weight:780;
        display:flex;align-items:center;gap:10px;
      }
      .badge{
        font-family:var(--mono);
        font-size:12px;
        padding:4px 9px;border-radius:999px;
        border:1px solid var(--line);
        background:linear-gradient(180deg, rgba(14,21,38,.75), rgba(9,12,22,.65));
        color:var(--mut);
      }
      .sub{
        margin:0;
        color:var(--mut);
        line-height:1.35;
        max-width:740px;
      }
      .right{
        display:flex;align-items:center;gap:10px;flex-wrap:wrap;
        justify-content:flex-end;
      }
      button, .btn{
        appearance:none;border:1px solid var(--line);
        background:linear-gradient(180deg, rgba(17,25,45,.85), rgba(11,14,24,.78));
        color:var(--txt);
        padding:10px 12px;border-radius:12px;
        cursor:pointer;
        box-shadow: 0 10px 30px rgba(0,0,0,.25);
        transition: transform .08s ease, border-color .15s ease, background .15s ease, opacity .15s ease;
      }
      button:hover{border-color:#334363}
      button:active{transform:translateY(1px)}
      button:disabled{opacity:.55;cursor:not-allowed}
      .btnPri{
        border-color:#2d4c7a;
        background:linear-gradient(180deg, rgba(48,88,150,.55), rgba(16,22,40,.8));
      }
      .btnAcc{
        border-color:#4a2d76;
        background:linear-gradient(180deg, rgba(150,70,255,.18), rgba(16,22,40,.8));
      }
      .btnGhost{
        background:transparent;
        border-color:var(--line2);
        box-shadow:none;
      }
      .grid{
        display:grid;
        grid-template-columns: 1.05fr .95fr;
        gap:16px;
        margin-top:12px;
      }
      @media (max-width: 980px){
        .grid{grid-template-columns:1fr}
      }
      .card{
        border:1px solid var(--line2);
        background: linear-gradient(180deg, rgba(14,21,38,.78), rgba(10,13,22,.72));
        border-radius:var(--r2);
        box-shadow: var(--shadow);
        overflow:hidden;
      }
      .card .hd{
        padding:14px 14px 12px;
        border-bottom:1px solid rgba(37,48,74,.65);
        display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
      }
      .card .hd h2{
        margin:0;
        font-size:14px;
        letter-spacing:.6px;
        text-transform:uppercase;
        color:var(--mut);
      }
      .card .bd{padding:14px}
      .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
      .col{display:flex;flex-direction:column;gap:6px}
      label{font-size:12px;color:var(--mut2)}
      input, select, textarea{
        width:100%;
        border:1px solid var(--line2);
        background:rgba(7,9,14,.7);
        color:var(--txt);
        padding:10px 10px;border-radius:12px;
        outline:none;
        font-family:var(--mono);
        font-size:13px;
      }
      input:focus, select:focus, textarea:focus{border-color:#35507f}
      textarea{min-height:86px;resize:vertical}
      .kvs{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:10px;
      }
      @media (max-width: 560px){
        .kvs{grid-template-columns:1fr}
      }
      .kv{
        border:1px solid var(--line2);
        background:linear-gradient(180deg, rgba(7,9,14,.62), rgba(6,7,10,.56));
        border-radius:14px;
        padding:10px 10px;
      }
      .kv .k{font-size:12px;color:var(--mut2);margin-bottom:6px}
      .kv .v{font-family:var(--mono);font-size:12.5px;color:var(--txt);word-break:break-all}
      .pill{
        display:inline-flex;align-items:center;gap:8px;
        padding:6px 10px;border-radius:999px;
        border:1px solid var(--line2);
        background:rgba(7,9,14,.55);
        color:var(--mut);
        font-family:var(--mono);
