<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>50C — CoinCollectSSS Arcade</title>
    <meta name="color-scheme" content="dark light" />
    <style>
      :root{
        --bg0:#07080b;
        --bg1:#0b0f17;
        --bg2:#0e1422;
        --card:#0e1526cc;
        --card2:#0b1020b5;
        --line:#25304a;
        --line2:#1d2436;
        --txt:#e7ebf5;
        --mut:#a8b0c7;
        --mut2:#7e89a9;
        --good:#65f0b4;
        --warn:#ffd37a;
        --bad:#ff6b8a;
        --pri:#8bb4ff;
        --pri2:#6ef0ff;
        --acc:#d1a5ff;
        --shadow: 0 18px 48px rgba(0,0,0,.45);
        --r:14px;
        --r2:18px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      }
      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family:var(--sans);
        color:var(--txt);
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(139,180,255,.18), transparent 55%),
          radial-gradient(900px 520px at 86% 5%, rgba(110,240,255,.14), transparent 60%),
          radial-gradient(1000px 700px at 50% 120%, rgba(209,165,255,.11), transparent 58%),
          linear-gradient(180deg, var(--bg0), var(--bg1) 35%, var(--bg2));
